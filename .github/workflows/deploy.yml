name: Validate and Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTHONHASHSEED: "0"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate signals.json
        run: python3 -m json.tool signals.json > /dev/null

      - name: Validate ENTITIES.json
        run: python3 -m json.tool ENTITIES.json > /dev/null

      - name: Run unit tests
        run: |
          pip install pytest --quiet
          PYTHONHASHSEED=0 python3 -m pytest tests/unit/ tests/golden/ -v

  # GitHub Pages деплоится автоматически при push в main
  # Дополнительного шага деплоя не требуется
