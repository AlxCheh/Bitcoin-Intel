name: Validate, Synthesize and Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTHONHASHSEED: "0"

jobs:
  validate:
    name: Validate and Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Единая установка всех dev-зависимостей из requirements.txt — раньше
      # каждый шаг ставил пакет по отдельности (`pip install flake8`,
      # `pip install pytest`, `pip install pip-audit`), и requirements.txt
      # не был реальным единым источником истины: hypothesis там уже был
      # объявлен (T06), но ни разу не ставился в CI — баг был незаметен,
      # пока ни один тест её не импортировал. tests/unit/test_confidence_properties.py
      # (C2 ARR v3) теперь импортирует hypothesis напрямую — без этого шага
      # CI упал бы с ImportError при первом же запуске.
      - name: Install dependencies
        run: pip install -r requirements.txt --quiet

      - name: Lint
        run: flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Validate signals.json
        run: python3 -m json.tool signals.json > /dev/null && echo "OK signals.json"

      - name: Validate ENTITIES.json
        run: python3 -m json.tool ENTITIES.json > /dev/null && echo "OK ENTITIES.json"

      - name: Check signal IDs unique
        run: |
          python3 -c "
          import json, sys
          data = json.load(open('signals.json'))
          signals = data.get('signals', data) if isinstance(data, dict) else data
          ids = [s['id'] for s in signals]
          dupes = [i for i in ids if ids.count(i) > 1]
          if dupes:
              print('Duplicate IDs: ' + str(set(dupes)))
              sys.exit(1)
          print('OK ' + str(len(ids)) + ' unique signal IDs')
          "

      - name: Validate data integrity (M6)
        run: python3 scripts/validate_integrity.py

      - name: Run tests
        run: PYTHONHASHSEED=0 python3 -m pytest tests/unit/ tests/golden/ tests/integration/ -v --tb=short

      - name: Security audit
        run: pip-audit --requirement requirements.txt || true

  synthesize:
    name: Synthesize Narratives
    runs-on: ubuntu-latest
    needs: validate
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run synthesizer
        run: PYTHONHASHSEED=0 python3 scripts/synthesizer.py

      - name: Verify synthesis_cache.json
        run: |
          python3 -c "
          import json, sys
          data = json.load(open('data/synthesis_cache.json'))
          print('OK synthesis_cache.json: ' + str(len(data)) + ' clusters')
          for k, v in data.items():
              print('  ' + k + ': ' + v.get('strength','?') + ' phase=' + v.get('phase','?'))
          "

      - name: Commit synthesis cache via PR (not direct push to main)
        # main защищён Branch Protection (IRP v1 M05, Вариант 3): прямой push
        # запрещён даже для github-actions[bot]. Поэтому: коммит в отдельную
        # ветку → PR → auto-merge после зелёного статус-чека "validate".
        # Используется SYNTHESIS_BOT_TOKEN (не GITHUB_TOKEN): PR/push, созданные
        # штатным GITHUB_TOKEN, не порождают новый workflow run (защита от
        # рекурсии GitHub Actions) — "validate" на этом PR никогда не запустился
        # бы, и auto-merge завис бы навсегда ожидая статус, который не наступит.
        env:
          GH_TOKEN: ${{ secrets.SYNTHESIS_BOT_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/synthesis_cache.json || true
          if git diff --staged --quiet; then
            echo "Нет изменений в synthesis_cache.json — пропуск PR"
            exit 0
          fi
          BRANCH="bot/sync-synthesis-${{ github.run_id }}"
          git checkout -b "$BRANCH"
          git commit -m "chore: update synthesis_cache.json [skip ci]"
          git push "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git" "HEAD:refs/heads/$BRANCH"
          gh pr create --base main --head "$BRANCH" \
            --title "chore: sync synthesis_cache.json ($(date -u +%Y-%m-%d))" \
            --body "Автосинтез после коммита ${{ github.sha }}. Auto-merge после зелёного validate."
          gh pr merge "$BRANCH" --auto --squash --delete-branch


  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: synthesize
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: "."

      - id: deployment
        uses: actions/deploy-pages@v4