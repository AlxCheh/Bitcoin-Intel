[tool.flake8]
max-line-length = 100
exclude = [".git", "__pycache__", "archive/"]

[tool.black]
line-length = 100
target-version = ["py311"]

[tool.pytest.ini_options]
testpaths = ["tests"]
markers = [
    "perf: performance/timing tests (IRP v1 Wave 4 / REM-M09) — not in main CI, run via `pytest -m perf` or the weekly scheduled workflow",
]
